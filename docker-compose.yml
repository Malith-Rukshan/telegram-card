services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${EXPOSE_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
